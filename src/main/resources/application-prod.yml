# MyBatis 配置 - 生产环境禁用 SQL 日志
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
  level:
    com.bjdx.rice.mapper: warn
    com.bjdx.rice.business.interceptor: info
    com.bjdx.rice.business.service.vector: info
    org.apache.ibatis: warn

# 用友接口配置
yongyou:
  url: http://47.98.53.78:8503/hengying/masterbill/create

# 向量检索配置（生产环境）
vector:
  search:
    # 生产环境启用向量匹配
    enabled: true
    # LCS比率初始阈值（商品搜索使用最长公共子序列算法，0.5区分度最佳）
    similarity-threshold: 0.5
    max-results: 3
    log-matches: true
  
  embedding:
    # 使用本地模型
    model-type: local
    local-model:
      # 使用服务器上的本地模型
      model-name: /root/models/text2vec-base-chinese
      dimension: 768
    api-config:
      url: ""
      api-key: ""
      model: embedding-v1
  
  database:
    type: pgvector
    pgvector:
      host: localhost
      port: 5432
      database: rice_vector
      username: rice
      password: "Rice@2024!"
    milvus:
      host: localhost
      port: 19530
      collection-prefix: rice
  
  sync:
    # 是否启用启动时自动同步（默认关闭，通过API手动触发）
    auto-sync-on-startup: false
